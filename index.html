<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GESTIÓN ALMACÉN BODEGA</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ========================= -->
  <!-- BARRA SUPERIOR -->
  <!-- ========================= -->

  <header id="topbar">

    <button id="btnDelete">
      🗑 Borrar Selección
    </button>

    <button id="btnUndo">
    ↶ Deshacer Borrado
    </button>

    <button id="btnClear">
      🧹 Vaciar Almacén
    </button>

    <button id="btnPdf">
      📄 Exportar PDF
    </button>

    <button id="btnTotals">
      📊 TOTALES
    </button>

     <button id="btnBack" class="hidden">
      ⬅ Volver al Plano
    </button>

    <button id="btnExport">
  📤 Exportar
</button>

<button id="btnImport">
  📥 Importar
</button>

<input
  type="file"
  id="importFile"
  accept=".json"
  hidden
>
  </header>

  <!-- ========================= -->
  <!-- VISTA PRINCIPAL -->
  <!-- ========================= -->

  <main id="mainView">

    <!-- PANEL -->
    <aside id="panel">

      <h2>PALETA DE STOCK</h2>

      <div id="palette"></div>

      <hr>

      <h2>Estructuras / Objetos</h2>

      <!-- ESTRUCTURA NEGRA -->

      <div class="structureRow">

        <div
          class="structureSquare borderBlack"
          draggable="true"
          data-structure="black"
        ></div>

        <input
          type="text"
          class="structureInput"
          placeholder="Nombre"
          data-structure-input="black"
        >

      </div>

      <!-- ESTRUCTURA ROJA -->

      <div class="structureRow">

        <div
          class="structureSquare borderRed"
          draggable="true"
          data-structure="red"
        ></div>

        <input
          type="text"
          class="structureInput"
          placeholder="Nombre"
          data-structure-input="red"
        >

      </div>

    </aside>

    <!-- GRID -->

    <section id="gridWrapper">
      <div id="grid"></div>
    </section>

  </main>

  <!-- ========================= -->
  <!-- VISTA TOTALES -->
  <!-- ========================= -->

  <section id="totalsView" class="hidden">

    <div id="totalsContainer">

      <table id="totalsTable">

        <thead>

          <tr>
            <th>Marca</th>
            <th>Añada</th>
            <th>Capacidad (Litros)</th>
            <th>Total Unidades</th>
            <th>Estado</th>
            <th>Total Palets</th>
            <th>Total Litros</th>
          </tr>

        </thead>

        <tbody id="totalsBody"></tbody>

      </table>

    </div>

  </section>

  <!-- ========================= -->
<!-- EDITAR UBICACIÓN -->
<!-- ========================= -->

<div id="editModal" class="hidden">

  <div id="editBox">

    <h2>EDITAR UBICACIÓN</h2>

    <label>Marca</label>
    <select id="editMarca"disabled>
      <option>Platón</option>
      <option>Abracadabra</option>
      <option>Madremia</option>
      <option>24 Mozas</option>
      <option>Loquillo Tinto</option>
      <option>Loquillo Verdejo</option>
      <option>El Principito</option>
      <option>Encomienda</option>
      <option>Ofertas</option>
    </select>

    <label>Añada</label>
    <input id="editAnada" type="number">

    <label>Capacidad</label>
    <select id="editCapacidad">
      <option value="1.5">1.5 L</option>
      <option value="0.75">0.75 L</option>
      <option value="0.5">0.5 L</option>
    </select>

    <label>Estado</label>
    <select id="editEstado">
      <option>Etiquetado</option>
      <option>Sin Etiquetar</option>
    </select>

    <label>Tipo Palet</label>
    <select id="editTipoPalet">
      <option>Europeo</option>
      <option>Americano</option>
    </select>

    <div id="editOfertaBox">

      <label>Oferta</label>

      <select id="editOferta">

        <option value="">-- Ninguna --</option>
        <option>6+6</option>
        <option>4+4+4</option>
        <option>3+3+3+3</option>
        <option>2+2+2</option>
        <option>maletin mixto</option>
        <option>estuche mixto</option>

      </select>

    </div>

    <label>Unidades</label>
    <input id="editUnidades" type="number">

    <label>Palets</label>
    <input id="editPalets" type="number">

    <div id="editButtons">

      <button id="btnCancelEdit">
        Cancelar
      </button>

      <button id="btnSaveEdit">
        Guardar
      </button>

    </div>

  </div>

</div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
